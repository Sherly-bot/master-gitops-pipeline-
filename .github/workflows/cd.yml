name: CD — Build, Push & Deploy

on:
  workflow_run:
    workflows: ["CI — Test & Lint"]
    types: [completed]
    branches: [main, dev]

  # Also allow manual deploys
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, production]
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: latest

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository }}

jobs:
  # ────────────────────────────────────────────────────────
  #  GUARD — Only run if CI passed
  # ────────────────────────────────────────────────────────
  check-ci:
    name: Verify CI passed
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: CI check passed
        run: echo "✅ CI pipeline passed. Proceeding with deployment."

  # ────────────────────────────────────────────────────────
  #  BUILD & PUSH — Docker images to GHCR
  # ────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: check-ci
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      backend-image: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-backend
      frontend-image: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Extract Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-frontend
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}

      - name: Output image digest
        run: |
          echo "### Docker Images Pushed 🐳" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** ${{ steps.meta-backend.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** ${{ steps.meta-frontend.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────
  #  DEPLOY TO STAGING (dev branch → staging server)
  # ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: >
      github.ref == 'refs/heads/dev' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to staging server
        id: deploy
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          IMAGE_TAG: sha-${{ github.sha }}
          PROJECT_NAME: ${{ github.event.repository.name }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
        run: |
          ssh ${{ env.SSH_USER }}@${{ env.SERVER_HOST }} << 'ENDSSH'
            set -e
            cd /opt/${PROJECT_NAME}-staging

            echo "▶ Saving current image tag for rollback..."
            PREVIOUS_TAG=$(docker inspect --format='{{index .Config.Image}}' ${PROJECT_NAME}-backend 2>/dev/null || echo "none")
            echo "PREVIOUS_TAG=${PREVIOUS_TAG}" > .rollback-state

            echo "▶ Pulling new images..."
            docker pull ${REGISTRY}/${IMAGE_BASE}-backend:${IMAGE_TAG}
            docker pull ${REGISTRY}/${IMAGE_BASE}-frontend:${IMAGE_TAG}

            echo "▶ Updating image tags in compose..."
            export BACKEND_IMAGE="${REGISTRY}/${IMAGE_BASE}-backend:${IMAGE_TAG}"
            export FRONTEND_IMAGE="${REGISTRY}/${IMAGE_BASE}-frontend:${IMAGE_TAG}"

            echo "▶ Rolling update (zero downtime)..."
            docker compose -f docker-compose.staging.yml up -d --no-build \
              --scale backend=2 2>/dev/null || true
            sleep 10
            docker compose -f docker-compose.staging.yml up -d --no-build
          ENDSSH

      - name: Health check — staging
        id: health-check
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          BACKEND_PORT: ${{ vars.STAGING_BACKEND_PORT || 5000 }}
        run: |
          echo "▶ Running health check..."
          MAX_RETRIES=5
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i / $MAX_RETRIES..."
            STATUS=$(ssh ${{ env.SSH_USER }}@${{ env.SERVER_HOST }} \
              "curl -fsS -o /dev/null -w '%{http_code}' http://localhost:${{ env.BACKEND_PORT }}/health" \
              2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "⚠ Health check returned HTTP $STATUS. Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "❌ Health check failed after $MAX_RETRIES attempts."
          exit 1

      - name: Rollback staging on health check failure
        if: failure() && steps.health-check.outcome == 'failure'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          echo "🔄 Rolling back to previous image..."
          ssh ${{ env.SSH_USER }}@${{ env.SERVER_HOST }} << 'ENDSSH'
            cd /opt/${PROJECT_NAME}-staging
            source .rollback-state
            export BACKEND_IMAGE="${PREVIOUS_TAG}"
            docker compose -f docker-compose.staging.yml up -d --no-build
            echo "Rollback complete."
          ENDSSH
          echo "❌ Deployment rolled back." >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────
  #  DEPLOY TO PRODUCTION (main branch → production, manual approval required)
  # ────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: >
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production             # GitHub requires manual approval for this env
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.PROD_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to production
        id: deploy-prod
        env:
          SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          IMAGE_TAG: sha-${{ github.sha }}
          PROJECT_NAME: ${{ github.event.repository.name }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
        run: |
          ssh ${{ env.SSH_USER }}@${{ env.SERVER_HOST }} << 'ENDSSH'
            set -e
            cd /opt/${PROJECT_NAME}

            echo "▶ Saving rollback state..."
            PREVIOUS_BACKEND=$(docker inspect --format='{{index .Config.Image}}' ${PROJECT_NAME}-backend 2>/dev/null || echo "none")
            PREVIOUS_FRONTEND=$(docker inspect --format='{{index .Config.Image}}' ${PROJECT_NAME}-frontend 2>/dev/null || echo "none")
            echo "PREVIOUS_BACKEND=${PREVIOUS_BACKEND}" > .rollback-state
            echo "PREVIOUS_FRONTEND=${PREVIOUS_FRONTEND}" >> .rollback-state

            echo "▶ Pulling production images..."
            docker pull ${REGISTRY}/${IMAGE_BASE}-backend:${IMAGE_TAG}
            docker pull ${REGISTRY}/${IMAGE_BASE}-frontend:${IMAGE_TAG}

            export BACKEND_IMAGE="${REGISTRY}/${IMAGE_BASE}-backend:${IMAGE_TAG}"
            export FRONTEND_IMAGE="${REGISTRY}/${IMAGE_BASE}-frontend:${IMAGE_TAG}"

            echo "▶ Deploying to production..."
            docker compose -f docker-compose.production.yml up -d --no-build
          ENDSSH

      - name: Health check — production
        id: health-check-prod
        env:
          SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          BACKEND_PORT: ${{ vars.PROD_BACKEND_PORT || 5000 }}
        run: |
          MAX_RETRIES=6
          RETRY_DELAY=15
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i / $MAX_RETRIES..."
            STATUS=$(ssh ${{ env.SSH_USER }}@${{ env.SERVER_HOST }} \
              "curl -fsS -o /dev/null -w '%{http_code}' http://localhost:${{ env.BACKEND_PORT }}/health" \
              2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production health check passed."
              echo "### ✅ Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
              echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            echo "⚠ HTTP $STATUS. Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          echo "❌ Production health check failed."
          exit 1

      - name: Rollback production on failure
        if: failure() && steps.health-check-prod.outcome == 'failure'
        env:
          SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          echo "🔄 PRODUCTION ROLLBACK INITIATED..."
          ssh ${{ env.SSH_USER }}@${{ env.SERVER_HOST }} << 'ENDSSH'
            cd /opt/${PROJECT_NAME}
            source .rollback-state
            export BACKEND_IMAGE="${PREVIOUS_BACKEND}"
            export FRONTEND_IMAGE="${PREVIOUS_FRONTEND}"
            docker compose -f docker-compose.production.yml up -d --no-build
            echo "✅ Production rollback complete."
          ENDSSH
          echo "### ❌ Production Rollback Complete" >> $GITHUB_STEP_SUMMARY
