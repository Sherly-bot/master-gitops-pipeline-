version: "3.9"

# ═══════════════════════════════════════════════════════════
#  MASTER DOCKER COMPOSE — Universal GitOps Pipeline
#  Comment out any service not needed for your project.
#  Copy this file to the root of any new project and adjust
#  the environment variables in .env.local
# ═══════════════════════════════════════════════════════════

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
  postgres-data:
  redis-data:

services:

  # ──────────────────────────────────────────
  #  BACKEND — Node.js / Express
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production           # Change to "deps" for hot-reload dev
    container_name: ${PROJECT_NAME:-app}-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:${PORT:-5000}"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      MONGO_URI: ${MONGO_URI:-}
      POSTGRES_URI: ${POSTGRES_URI:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    depends_on:
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      # Dev only: mount source for hot reload
      # - ./backend/src:/app/src
      - /app/node_modules           # Anonymous volume to preserve container modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-5000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────
  #  FRONTEND — React + Nginx
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000}
    container_name: ${PROJECT_NAME:-app}-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - app-network

  # ──────────────────────────────────────────
  #  MONGODB  (comment out if not using)
  # ──────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: ${PROJECT_NAME:-app}-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-appdb}
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────
  #  POSTGRESQL  (comment out if not using)
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-app}-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-appdb}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ──────────────────────────────────────────
  #  REDIS  (comment out if not using)
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-app}-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────
  #  MONGO EXPRESS — DB GUI (dev only)
  # ──────────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: ${PROJECT_NAME:-app}-mongo-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network
    profiles:
      - dev-tools                  # Only starts with: docker compose --profile dev-tools up
