name: CI — Test & Lint

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel previous runs on the same branch (saves minutes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Shared test environment — no real secrets, safe values only
  NODE_ENV: test
  JWT_SECRET: ci-test-secret-not-real
  MONGO_URI: mongodb://localhost:27017/testdb
  POSTGRES_URI: postgresql://admin:changeme@localhost:5432/testdb
  REDIS_URL: redis://localhost:6379

jobs:
  # ────────────────────────────────────────────────────────
  #  JOB 1 — Lint (runs fast, fails early)
  # ────────────────────────────────────────────────────────
  lint:
    name: Lint Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run ESLint (backend)
        working-directory: backend
        run: |
          if [ -d "src" ]; then
            npx eslint src/ --ext .js \
              --format stylish \
              --max-warnings=0 \
              --output-file ../eslint-backend-report.txt || \
            (cat ../eslint-backend-report.txt && exit 1)
          else
            echo "Skipping backend lint: No src/ directory found"
          fi

      - name: Setup Node.js (frontend lint)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint (frontend)
        working-directory: frontend
        run: |
          if [ -f ".eslintrc.js" ]; then
            npx eslint src/ --ext .js,.jsx,.ts,.tsx \
              --format stylish \
              --max-warnings=0 \
              --output-file ../eslint-frontend-report.txt || \
            (cat ../eslint-frontend-report.txt && exit 1)
          else
            echo "Skipping frontend lint: No .eslintrc.js found"
          fi

      - name: Upload ESLint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-reports
          path: "*.txt"
          retention-days: 7

  # ────────────────────────────────────────────────────────
  #  JOB 2 — Backend Tests (Matrix: Node 18 & 20)
  # ────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false          # Run both matrix versions even if one fails
      matrix:
        node-version: [18, 20]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run Jest tests with detailed output
        working-directory: backend
        run: |
          npm test -- \
            --coverage \
            --coverageReporters=text \
            --coverageReporters=lcov \
            --coverageReporters=html \
            --coverageReporters=json-summary \
            --forceExit \
            --detectOpenHandles \
            --verbose \
            --testResultsProcessor=jest-junit \
            2>&1 | tee test-output-node${{ matrix.node-version }}.txt
        env:
          JEST_JUNIT_OUTPUT_DIR: ./reports
          JEST_JUNIT_OUTPUT_NAME: junit-node${{ matrix.node-version }}.xml
          JEST_JUNIT_CLASSNAME: "{classname}"
          JEST_JUNIT_TITLE: "{title}"

      - name: Extract test summary
        if: always()
        working-directory: backend
        run: |
          echo "## Test Results — Node ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 test-output-node${{ matrix.node-version }}.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check coverage threshold (60% minimum)
        working-directory: backend
        run: |
          COVERAGE=$(node -e "
            const s = require('./coverage/coverage-summary.json');
            const lines = s.total.lines.pct;
            console.log(lines);
          ")
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below 60% threshold!"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets threshold."

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports-node${{ matrix.node-version }}
          path: |
            backend/coverage/
            backend/reports/
            backend/test-output-*.txt
          retention-days: 14

  # ────────────────────────────────────────────────────────
  #  JOB 3 — Frontend Tests
  # ────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: |
          npm test -- \
            --watchAll=false \
            --coverage \
            --coverageReporters=text \
            --coverageReporters=lcov \
            --coverageReporters=html \
            --forceExit \
            --verbose \
            2>&1 | tee test-output-node${{ matrix.node-version }}.txt

      - name: Upload frontend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports-node${{ matrix.node-version }}
          path: |
            frontend/coverage/
            frontend/test-output-*.txt
          retention-days: 14

  # ────────────────────────────────────────────────────────
  #  JOB 4 — PR Comment with Results Summary
  # ────────────────────────────────────────────────────────
  comment-pr:
    name: Post PR Summary Comment
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write

    steps:
      - name: Download backend test reports
        uses: actions/download-artifact@v4
        with:
          name: backend-test-reports-node20
          path: backend-reports
        continue-on-error: true

      - name: Build PR comment
        id: build-comment
        run: |
          BACKEND_STATUS="${{ needs.test-backend.result }}"
          FRONTEND_STATUS="${{ needs.test-frontend.result }}"

          # Extract coverage if available
          COVERAGE="N/A"
          if [ -f "backend-reports/coverage/coverage-summary.json" ]; then
            COVERAGE=$(node -e "
              const s = require('./backend-reports/coverage/coverage-summary.json');
              console.log(s.total.lines.pct + '%');
            " 2>/dev/null || echo "N/A")
          fi

          STATUS_ICON_BACKEND="✅"
          STATUS_ICON_FRONTEND="✅"
          [ "$BACKEND_STATUS" != "success" ] && STATUS_ICON_BACKEND="❌"
          [ "$FRONTEND_STATUS" != "success" ] && STATUS_ICON_FRONTEND="❌"

          COMMENT="## 🚀 CI Pipeline Results

          | Check | Status |
          |-------|--------|
          | Backend Tests (Node 18 & 20) | ${STATUS_ICON_BACKEND} ${BACKEND_STATUS} |
          | Frontend Tests (Node 18 & 20) | ${STATUS_ICON_FRONTEND} ${FRONTEND_STATUS} |
          | Backend Coverage | 📊 ${COVERAGE} |

          **Commit:** \`${{ github.sha }}\`
          **Branch:** \`${{ github.head_ref }}\`

          > 📥 Download detailed HTML coverage reports from the [Actions artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-results
          message: ${{ steps.build-comment.outputs.comment }}

  # ────────────────────────────────────────────────────────
  #  JOB 5 — CI Gate (CD pipeline waits for this)
  # ────────────────────────────────────────────────────────
  ci-success:
    name: CI Gate ✅
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ needs.test-backend.result }}" != "success" || \
                "${{ needs.test-frontend.result }}" != "success" ]]; then
            echo "❌ CI failed. Blocking CD pipeline."
            exit 1
          fi
          echo "✅ All CI checks passed. CD pipeline may proceed."

  # ────────────────────────────────────────────────────────
  #  JOB 6 — Build & Push (Only runs if CI passes)
  # ────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: ci-success
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-backend:latest
            ghcr.io/${{ github.repository }}-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-frontend:latest
            ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}
